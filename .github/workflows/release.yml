name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        type: string
      libtorrent_ref:
        description: Pinned libtorrent ref or latest
        required: false
        default: ""
        type: string
      switch_validation_baseline_version:
        description: Optional previously released version used for tag-switch validation
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate source dev package
        run: |
          ./scripts/validate-dev-package.sh source

      - name: Prepare scripts
        run: chmod +x scripts/*.sh

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "RELEASE_VERSION=${VERSION#v}" >> "${GITHUB_ENV}"
          echo "RELEASE_BRANCH=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"

      - name: Checkout release branch
        run: |
          git checkout -B "${RELEASE_BRANCH}"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure CMake
        run: |
          if ! command -v cmake >/dev/null 2>&1; then
            brew install cmake
          fi

      - name: Run release pipeline
        run: |
          if [[ -n "${{ inputs.libtorrent_ref }}" ]]; then
            export LIBTORRENT_REF="${{ inputs.libtorrent_ref }}"
          fi
          ./scripts/release.sh "${RELEASE_VERSION}"

      - name: Commit release metadata
        run: |
          if [[ -z "$(git status --porcelain -- Package.swift PackageSupport/BinaryArtifact.env Sources/LibtorrentAppleBridgeCompat)" ]]; then
            echo "No tracked release metadata changes."
          else
            git add Package.swift PackageSupport/BinaryArtifact.env Sources/LibtorrentAppleBridgeCompat
            git commit -m "chore(release): prepare ${RELEASE_VERSION}"
            git push origin "HEAD:${RELEASE_BRANCH}"
          fi

      - name: Validate version switching before publication
        if: ${{ inputs.switch_validation_baseline_version != '' }}
        run: |
          ./scripts/prepublish-validate-version-switch.sh \
            --version-a "${{ inputs.switch_validation_baseline_version }}" \
            --version-b "${RELEASE_VERSION}"

      - name: Create and push release tag
        run: |
          RELEASE_TAG="v${RELEASE_VERSION}"
          git fetch --tags origin
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists." >&2
            exit 1
          fi
          git tag -a "${RELEASE_TAG}" -m "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/publish-github-release.sh "${RELEASE_VERSION}"

      - name: Validate remote binary package
        run: |
          ./scripts/validate-swift-package.sh remote-binary
